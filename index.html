<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Bracket Tracker — The Frequency Framework</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg-deep: #0a0a0f;
    --bg-card: #0f1118;
    --bg-card-hover: #141722;
    --border-subtle: rgba(212, 168, 67, 0.08);
    --border-active: rgba(212, 168, 67, 0.25);
    --amber: #d4a843;
    --amber-dim: rgba(212, 168, 67, 0.6);
    --amber-glow: rgba(212, 168, 67, 0.15);
    --red: #dc4f4f;
    --green: #4fdc6f;
    --teal: #64dcdc;
    --text-primary: #e8e8ec;
    --text-secondary: #8a8a9a;
    --text-dim: #55556a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-deep); color: var(--text-primary); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

  .bg-grid {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background-image: linear-gradient(rgba(212,168,67,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(212,168,67,0.02) 1px, transparent 1px);
    background-size: 40px 40px; z-index: 0;
  }

  .header { position: relative; z-index: 10; text-align: center; padding: 2.5rem 1.5rem 1rem; }
  .header-badge { display: inline-block; font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--amber-dim); border: 1px solid var(--border-subtle); padding: 0.25rem 0.8rem; margin-bottom: 1rem; background: rgba(212,168,67,0.03); }
  .header h1 { font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: clamp(1.2rem, 3vw, 1.8rem); letter-spacing: 0.15em; color: var(--amber); text-shadow: 0 0 30px rgba(212,168,67,0.2); }
  .header p { font-family: 'Share Tech Mono', monospace; font-size: 0.7rem; color: var(--text-dim); margin-top: 0.5rem; letter-spacing: 0.1em; }

  .stats-bar {
    position: relative; z-index: 10; display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap;
    padding: 1rem 1.5rem; margin: 0 auto 1.5rem; max-width: 900px;
  }
  .stat-box {
    background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 0.8rem 1.2rem;
    text-align: center; min-width: 120px; border-radius: 2px;
  }
  .stat-label { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.3rem; }
  .stat-value { font-family: 'Orbitron', sans-serif; font-size: 1.3rem; font-weight: 700; }
  .stat-value.green { color: var(--green); }
  .stat-value.amber { color: var(--amber); }
  .stat-value.red { color: var(--red); }
  .stat-value.teal { color: var(--teal); }

  .note-bar {
    position: relative; z-index: 10; text-align: center; padding: 0.5rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--text-dim);
    border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle);
    margin-bottom: 1.5rem; letter-spacing: 0.05em;
  }

  .round-filters {
    position: relative; z-index: 10; display: flex; justify-content: center; gap: 0.5rem;
    flex-wrap: wrap; padding: 0 1.5rem; margin-bottom: 1.5rem;
  }
  .rf-btn {
    font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 0.08em;
    padding: 0.4rem 0.8rem; background: var(--bg-card); color: var(--text-secondary);
    border: 1px solid var(--border-subtle); cursor: pointer; transition: all 0.2s; text-transform: uppercase;
  }
  .rf-btn:hover { border-color: var(--border-active); color: var(--text-primary); }
  .rf-btn.active { border-color: var(--amber); color: var(--amber); background: var(--amber-glow); }

  .games-container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 0 1.5rem 3rem; }

  .game-card {
    display: grid; grid-template-columns: 36px 1fr auto auto; align-items: center; gap: 0.8rem;
    background: var(--bg-card); border: 1px solid var(--border-subtle); padding: 0.8rem 1rem;
    margin-bottom: 0.5rem; transition: all 0.2s;
  }
  .game-card:hover { border-color: var(--border-active); background: var(--bg-card-hover); }

  .game-status {
    width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
    font-family: 'Orbitron', sans-serif; font-weight: 700; font-size: 0.9rem; border-radius: 2px;
  }
  .game-status.correct { background: rgba(79,220,111,0.1); color: var(--green); border: 1px solid rgba(79,220,111,0.2); }
  .game-status.wrong { background: rgba(220,79,79,0.1); color: var(--red); border: 1px solid rgba(220,79,79,0.2); }
  .game-status.pending { background: rgba(138,138,154,0.1); color: var(--text-dim); border: 1px solid rgba(138,138,154,0.15); }

  .game-info { min-width: 0; }
  .game-matchup { font-family: 'Rajdhani', sans-serif; font-size: 0.85rem; font-weight: 600; color: var(--text-primary); }
  .game-seed { color: var(--amber-dim); font-size: 0.75rem; margin-right: 0.15rem; }
  .game-vs { color: var(--text-dim); margin: 0 0.3rem; font-size: 0.7rem; }
  .game-meta { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: var(--text-dim); margin-top: 0.15rem; letter-spacing: 0.05em; }

  .game-pick { text-align: center; min-width: 80px; }
  .pick-label { font-family: 'Share Tech Mono', monospace; font-size: 0.5rem; color: var(--text-dim); letter-spacing: 0.1em; text-transform: uppercase; }
  .pick-team { font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 600; color: var(--amber); }
  .pick-conf { font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; margin-top: 0.1rem; }
  .pick-conf.high { color: var(--green); }
  .pick-conf.mid { color: var(--amber); }
  .pick-conf.low { color: var(--red); }

  .game-result { text-align: right; min-width: 70px; }
  .result-winner { font-family: 'Rajdhani', sans-serif; font-size: 0.8rem; font-weight: 600; }
  .result-winner.correct { color: var(--green); }
  .result-winner.wrong { color: var(--red); }
  .result-score { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; color: var(--text-dim); }

  footer {
    position: relative; z-index: 10; text-align: center; padding: 2rem 1.5rem;
    font-family: 'Share Tech Mono', monospace; font-size: 0.55rem; color: var(--text-dim);
    border-top: 1px solid var(--border-subtle); letter-spacing: 0.08em;
  }

  @media (max-width: 600px) {
    .game-card { grid-template-columns: 30px 1fr; gap: 0.5rem; }
    .game-pick, .game-result { grid-column: 2; }
    .stat-box { min-width: 90px; padding: 0.6rem 0.8rem; }
  }
</style>
</head>

function updateStats() {
  const played = GAMES.filter(g => g.status !== "pending");
  const correct = GAMES.filter(g => g.status === "correct");
  const wrong = GAMES.filter(g => g.status === "wrong");
  const pending = GAMES.filter(g => g.status === "pending");
  const pct = played.length > 0 ? ((correct.length / played.length) * 100).toFixed(1) : "0.0";

  // R64 only stats
  const r64 = GAMES.filter(g => g.round === "Round of 64");
  const r64played = r64.filter(g => g.status !== "pending");
  const r64correct = r64.filter(g => g.status === "correct");
  const r64pct = r64played.length > 0 ? ((r64correct.length / r64played.length) * 100).toFixed(1) : "0.0";

  document.getElementById('statsBar').innerHTML = `
    <div class="stat-box"><div class="stat-label">Played</div><div class="stat-value teal">${played.length}/${GAMES.length}</div></div>
    <div class="stat-box"><div class="stat-label">Correct</div><div class="stat-value green">${correct.length}</div></div>
    <div class="stat-box"><div class="stat-label">Wrong</div><div class="stat-value red">${wrong.length}</div></div>
    <div class="stat-box"><div class="stat-label">Overall</div><div class="stat-value amber">${pct}%</div></div>
    <div class="stat-box"><div class="stat-label">R64 Only</div><div class="stat-value green">${r64pct}%</div></div>
    <div class="stat-box"><div class="stat-label">Pending</div><div class="stat-value teal">${pending.length}</div></div>
  `;
}

function getConfClass(c) { return c >= 75 ? "high" : c >= 55 ? "mid" : "low"; }

function renderGames(round) {
  const filtered = round === "all" ? GAMES : GAMES.filter(g => g.round === round);
  document.getElementById('gamesContainer').innerHTML = filtered.map(g => {
    const resultHtml = g.status !== "pending" ? `
      <div class="game-result">
        <div class="result-winner ${g.status}">${g.result_winner}</div>
        <div class="result-score">${g.result_score}</div>
      </div>` : `<div class="game-result"><div class="result-winner" style="color:var(--text-dim)">—</div></div>`;

    return `<div class="game-card">
      <div class="game-status ${g.status}">${g.status === "correct" ? "✓" : g.status === "wrong" ? "✗" : "○"}</div>
      <div class="game-info">
        <div class="game-matchup">
          <span class="game-seed">(${g.seedA})</span>
          <span class="game-team">${g.teamA}</span>
          <span class="game-vs">vs</span>
          <span class="game-seed">(${g.seedB})</span>
          <span class="game-team">${g.teamB}</span>
        </div>
        <div class="game-meta">${g.round} — ${g.region} — ${g.date}</div>
      </div>
      <div class="game-pick">
        <div class="pick-label">Our Pick</div>
        <div class="pick-team">${g.pick}</div>
        <div class="pick-conf ${getConfClass(g.confidence)}">${g.confidence}%</div>
      </div>
      ${resultHtml}
    </div>`;
  }).join('');
}

function filterRound(round) {
  document.querySelectorAll('.rf-btn').forEach(b => b.classList.toggle('active', b.dataset.round === round));
  renderGames(round);
}

// Init
updateStats();
renderGames("all");
